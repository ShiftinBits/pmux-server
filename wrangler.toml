name = "pmux-signaling"
main = "src/worker.ts"
compatibility_date = "2026-02-23"
workers_dev = false
preview_urls = false

routes = [
  { pattern = "signal.pmux.io", zone_name = "pmux.io", custom_domain = true }
]

[observability]
enabled = true

[observability.logs]
enabled = true

[placement]
mode = "smart"

[durable_objects]
bindings = [
  { name = "SIGNALING", class_name = "SignalingDO" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["SignalingDO"]

# Environment secrets (set via `wrangler secret put`):
# - TURN_API_TOKEN
# - TURN_TOKEN_ID
# - JWT_SECRET
# - PMUX_HMAC_SECRET  (optional) — enables HMAC-SHA256 client signature validation;
#                     when set, all requests (except /health and /) must include
#                     valid `pmux-signature` and `pmux-timestamp` headers
